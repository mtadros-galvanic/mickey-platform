"$schema" = 'https://starship.rs/config-schema.json'

# ========================================
# Prompt layout
# Philosophy:
# - Line 1: identity, location, repo, infra risk
# - Line 2: execution context and status
# ========================================

format = """
$os\
$username\
$directory\
$git_branch\
$git_status\
$docker_context\
$line_break\
$container\
$hostname\
$sudo\
$cmd_duration\
$character
"""

palette = 'catppuccin_mocha'

# ========================================
# Identity
# ========================================

[os]
disabled = false
style = "fg:red"
format = "[$symbol]($style) "

[os.symbols]
Macos = "󰀵"
Linux = "󰌽"
Ubuntu = "󰕈"
Debian = "󰣚"
Arch = "󰣇"
Fedora = "󰣛"
Alpine = ""
Windows = ""

[username]
show_always = true
style_user = "fg:red"
style_root = "fg:red"
format = '[$user]($style) '

# ========================================
# Location
# ========================================

[directory]
style = "fg:peach"
format = "[$path]($style) "
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

# ========================================
# Git
# ========================================

[git_branch]
symbol = ""
style = "fg:yellow"
format = '[$symbol $branch]($style) '

[git_status]
style = "fg:yellow"
format = '[$all_status$ahead_behind]($style) '

# ========================================
# Docker / Devcontainer context
# ========================================

[docker_context]
symbol = ""
style = "fg:sapphire"
format = '[$symbol $context]($style) '

[container]
style = "fg:lavender"
format = '[$symbol $name]($style) '

# ========================================
# Remote / privilege indicators
# ========================================

[hostname]
ssh_symbol = "❮=❯ "
style = "fg:lavender"
format = '[$ssh_symbol$hostname]($style) '

[sudo]
disabled = false
symbol = "⚠️"
style = "fg:lavender"
format = "[$symbol]($style) "

# ========================================
# Command feedback
# ========================================

[cmd_duration]
show_milliseconds = true
format = " in $duration "
style = "fg:lavender"
disabled = false
show_notifications = false
min_time_to_notify = 45000

[character]
success_symbol = '[❯](bold fg:green)'
error_symbol   = '[❯](bold fg:red)'
vimcmd_symbol  = '[❮](bold fg:green)'

[line_break]
disabled = false

# ========================================
# Explicitly disable unused modules
# ========================================

[c]
disabled = true
[rust]
disabled = true
[golang]
disabled = true
[nodejs]
disabled = true
[php]
disabled = true
[java]
disabled = true
[kotlin]
disabled = true
[haskell]
disabled = true
[python]
disabled = true
[time]
disabled = true
[aws]
disabled = true
[kubernetes]
disabled = true
[pulumi]
disabled = true
[gcloud]
disabled = true
[conda]
disabled = true

