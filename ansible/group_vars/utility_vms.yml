mickey_utility_apt_packages:
  - bubblewrap
  - ca-certificates
  - cifs-utils
  - curl
  - fd-find
  - git
  - jq
  - qemu-guest-agent
  - ripgrep
  - rsync
  - tree
  - unzip
  - xz-utils
  - zip

mickey_utility_projects_sync_enable: true
mickey_utility_projects_root: "/home/{{ mickey_guest_admin_user }}/Projects"
mickey_utility_projects_dest_dir: "{{ mickey_utility_projects_root }}/mickey"
mickey_utility_share_mount_path: "{{ mickey_shared_mount_path }}"
mickey_utility_share_name: mickey-share
mickey_utility_share_server: "{{ hostvars['mickey-infra'].ansible_host | default('10.25.1.206') }}"
mickey_utility_share_credentials_path: /etc/mickey-platform/mickey-infra-share.credentials
mickey_utility_share_fstab_options: "credentials={{ mickey_utility_share_credentials_path }},uid={{ mickey_guest_admin_user }},gid={{ mickey_guest_admin_user }},vers=3.0,file_mode=0660,dir_mode=0770,mfsymlinks,_netdev,nofail,x-systemd.automount"
mickey_utility_fast_share_mount_path: "{{ mickey_fast_shared_mount_path }}"
mickey_utility_fast_share_name: mickey-shared-fast
mickey_utility_fast_share_server: "{{ hostvars['mickey-infra'].ansible_host | default('10.25.1.206') }}"
mickey_utility_fast_share_fstab_options: "{{ mickey_utility_share_fstab_options }}"

mickey_codex_enable: true
