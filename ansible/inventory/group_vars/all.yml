mickey_guest_admin_user: galvanic
mickey_guest_admin_home: "{{ '/root' if mickey_guest_admin_user == 'root' else '/home/' ~ mickey_guest_admin_user }}"
mickey_guest_admin_password_hash: "{{ guests.admin_password_hash | default(guests.extra_vm_admin_password_hash | default(guests.desktop_admin_password_hash | default(''))) if (guests is defined) else '' }}"
mickey_guest_fqdn: "{{ inventory_hostname }}.galvanic.local"

mickey_shared_mount_path: /mnt/mickey-share
mickey_fast_shared_mount_path: /mnt/mickey-shared-fast
mickey_persistent_tools_enable: true
mickey_persistent_tools_export_path: /srv/persistent-tools
mickey_persistent_tools_mount_path: /mnt/persistent-tools
mickey_persistent_tools_server: "{{ hostvars['mickey-infra'].ansible_host | default('10.25.1.206') }}"
mickey_persistent_tools_allowed_network: 10.25.1.0/24
mickey_persistent_tools_nfs_export_options: "ro,sync,no_subtree_check,root_squash"
mickey_persistent_tools_nfs_fstab_options: "ro,vers=4.2,_netdev,nofail,x-systemd.automount,x-systemd.idle-timeout=60"
mickey_persistent_tools_profile_script_path: /etc/profile.d/mickey-persistent-tools.sh
mickey_galvanic_ui_enable: true
mickey_galvanic_ui_repo_url: git@github.com:GalvanicAppliedSciences/galvanic-ui.git
mickey_galvanic_ui_ref: 3af42eabbf29ba8e28500eb6bc8e09ba9e62aaf8
mickey_galvanic_ui_dir: "{{ mickey_persistent_tools_mount_path }}/galvanic-ui"
mickey_galvanic_ui_export_dir: "{{ mickey_persistent_tools_export_path }}/galvanic-ui"
mickey_galvanic_ui_pnpm_store_dir: "{{ mickey_persistent_tools_export_path }}/.pnpm-store/galvanic-ui"

mickey_vm_base_apt_packages:
  - bubblewrap
  - ca-certificates
  - curl
  - git
  - iputils-ping
  - jq
  - mosh
  - nfs-common
  - python3
  - qemu-guest-agent
  - ripgrep
  - rsync
  - shellcheck
  - tree
  - unzip
  - wget
  - xz-utils
  - zip
mickey_vm_apt_packages: "{{ mickey_vm_base_apt_packages }}"
mickey_vm_base_package_install_method: apt
mickey_vm_base_configure_admin_user: true
mickey_vm_base_configure_hostname: true
mickey_vm_base_configure_codex: true
mickey_vm_base_configure_codex_auth: true
mickey_vm_base_configure_dotfiles: true
mickey_vm_base_configure_consul: "{{ 'consul_client_vms' in group_names }}"

mickey_herdr_enable: true
mickey_herdr_version: "0.6.2"
mickey_herdr_release_base_url: "https://github.com/ogulcancelik/herdr/releases/download/v{{ mickey_herdr_version }}"
mickey_herdr_release_arch_map:
  x86_64: x86_64
  amd64: x86_64
  aarch64: aarch64
  arm64: aarch64
mickey_herdr_install_dir: /usr/local/bin
mickey_herdr_bin_path: "{{ mickey_herdr_install_dir }}/herdr"

mickey_d2_enable: true
mickey_d2_version: "0.7.1"
mickey_d2_release_base_url: "https://github.com/terrastruct/d2/releases/download/v{{ mickey_d2_version }}"
mickey_d2_release_arch_map:
  x86_64: amd64
  amd64: amd64
  aarch64: arm64
  arm64: arm64
mickey_d2_install_dir: /usr/local/bin
mickey_d2_bin_path: "{{ mickey_d2_install_dir }}/d2"

mickey_gh_enable: true
mickey_gh_version: "2.93.0"
mickey_gh_release_base_url: "https://github.com/cli/cli/releases/download/v{{ mickey_gh_version }}"
mickey_gh_release_arch_map:
  x86_64: amd64
  amd64: amd64
  aarch64: arm64
  arm64: arm64

# Playbooks that install Codex set mickey_codex_node_version explicitly.
mickey_codex_node_arch: "linux-x64"
mickey_codex_node_archive_name: "node-v{{ mickey_codex_node_version }}-{{ mickey_codex_node_arch }}"
mickey_codex_node_install_root: "{{ mickey_guest_admin_home }}/.local/opt"
mickey_codex_node_install_dir: "{{ mickey_codex_node_install_root }}/{{ mickey_codex_node_archive_name }}"
mickey_codex_node_archive_url: "https://nodejs.org/dist/v{{ mickey_codex_node_version }}/{{ mickey_codex_node_archive_name }}.tar.xz"
mickey_codex_local_bin_dir: "{{ mickey_guest_admin_home }}/.local/bin"
mickey_codex_shell_home: "{{ mickey_guest_admin_home }}/.codex"
mickey_codex_shell_backup_home: "{{ mickey_guest_admin_home }}/.codex.local-pre-share"
mickey_codex_legacy_shared_root: "{{ mickey_shared_mount_path }}/admin/codex"
mickey_codex_shared_root: "{{ mickey_fast_shared_mount_path }}/admin/codex"
mickey_codex_hosts_root: "{{ mickey_codex_shared_root }}/hosts"
mickey_codex_shared_host_home: "{{ mickey_codex_hosts_root }}/{{ inventory_hostname }}"
mickey_codex_legacy_tmp_mount_path: "{{ mickey_codex_legacy_shared_root }}/hosts/{{ inventory_hostname }}/tmp"
mickey_codex_local_state_root: "{{ mickey_guest_admin_home }}/.local/state/codex"
mickey_codex_local_home: "{{ mickey_codex_local_state_root }}/home"
mickey_codex_local_tmp_path: "{{ mickey_codex_local_state_root }}/tmp"
mickey_codex_tmp_mount_path: "{{ mickey_codex_local_home }}/tmp"
mickey_codex_shared_tmp_mount_path: "{{ mickey_codex_shared_host_home }}/tmp"
mickey_codex_local_auth_path: "{{ mickey_codex_local_home }}/auth.json"
mickey_codex_local_auth_backup_path: "{{ mickey_codex_local_home }}/auth.json.local-backup"
mickey_codex_local_skills_path: "{{ mickey_codex_local_home }}/skills"
mickey_codex_local_skills_backup_path: "{{ mickey_codex_local_home }}/skills.local-backup"
mickey_codex_private_skills_path: "{{ mickey_codex_shared_host_home }}/skills"
mickey_codex_install_script_url: https://chatgpt.com/codex/install.sh
mickey_codex_standalone_bin_dir: "{{ mickey_guest_admin_home }}/.local/lib/codex/bin"
mickey_codex_standalone_bin_path: "{{ mickey_codex_standalone_bin_dir }}/codex"
mickey_codex_wrapper_path: "{{ mickey_codex_local_bin_dir }}/codex"
mickey_codex_real_bin_path: "{{ mickey_codex_local_bin_dir }}/codex-real"
mickey_codex_update_path: /usr/local/bin/codex-update
mickey_codex_sync_script_path: /usr/local/bin/mickey-codex-sync-auth
mickey_codex_profile_script_path: /etc/profile.d/mickey-codex.sh
mickey_codex_sandbox_sysctl_path: /etc/sysctl.d/99-mickey-codex-sandbox.conf
mickey_codex_sandbox_userns_enable: true
mickey_codex_shared_auth_path: "{{ mickey_codex_shared_root }}/auth.json"
mickey_codex_shared_skills_path: "{{ mickey_codex_shared_root }}/skills"
mickey_codex_shared_auth_enable: true
mickey_codex_global_mcp_servers:
  - name: galvanic-ui
    url: http://galvanic-ui.mickey.galvanic.com/mcp
mickey_codex_version: ""
mickey_codex_enable: true

mickey_pnpm_enable: true
mickey_pnpm_version: "11.5.2"
mickey_pnpm_use_corepack_shims: true
mickey_pnpm_store_root: "{{ mickey_fast_shared_mount_path }}/admin/pnpm/hosts"
mickey_pnpm_store_dir: "{{ mickey_pnpm_store_root }}/{{ inventory_hostname }}/store"

mickey_github_packages_auth_enable: true
mickey_github_packages_config_dir: "{{ mickey_guest_admin_home }}/.config/galvanic"
mickey_github_packages_env_path: "{{ mickey_github_packages_config_dir }}/github.env"
mickey_github_packages_scope: "@galvanicappliedsciences"
mickey_github_packages_registry: "https://npm.pkg.github.com"
mickey_github_cli_auth_enable: true
mickey_github_cli_user: mtadros-galvanic
mickey_github_cli_config_dir: "{{ mickey_guest_admin_home }}/.config/gh"
mickey_github_cli_hosts_path: "{{ mickey_github_cli_config_dir }}/hosts.yml"

mickey_pm2_enable: true
mickey_pm2_version: "7.0.1"
mickey_pm2_commands:
  - pm2
  - pm2-dev
  - pm2-runtime
  - pm2-docker

mickey_mermaid_cli_enable: true
mickey_mermaid_cli_package: "@mermaid-js/mermaid-cli"
mickey_mermaid_cli_version: "11.15.0"
mickey_mermaid_cli_commands:
  - mmdc
mickey_mermaid_cli_browser_apt_package_choices:
  - fonts-liberation
  - libasound2|libasound2t64
  - libatk-bridge2.0-0|libatk-bridge2.0-0t64
  - libatk1.0-0|libatk1.0-0t64
  - libatspi2.0-0|libatspi2.0-0t64
  - libcairo2
  - libcups2|libcups2t64
  - libdbus-1-3
  - libdrm2
  - libgbm1
  - libglib2.0-0|libglib2.0-0t64
  - libgtk-3-0|libgtk-3-0t64
  - libnspr4
  - libnss3
  - libpango-1.0-0
  - libx11-xcb1
  - libxcb1
  - libxcomposite1
  - libxdamage1
  - libxfixes3
  - libxkbcommon0
  - libxrandr2
  - libxss1
  - xdg-utils

mickey_dotfiles_enable: true
mickey_dotfiles_packages:
  - git
  - tmux
  - zsh
mickey_dotfiles_set_default_shell: true
mickey_dotfiles_default_shell: /usr/bin/zsh
mickey_dotfiles_tmux_version: "3.6a"
mickey_dotfiles_tmux_release_arch_map:
  x86_64: linux-x86_64
  amd64: linux-x86_64
  aarch64: linux-arm64
  arm64: linux-arm64
mickey_dotfiles_tmux_archive_checksum_map:
  linux-x86_64: "sha256:c0a772a5e6ca8f129b0111d10029a52e02bcbc8352d5a8c0d3de8466a1e59c2e"
  linux-arm64: "sha256:bb5afd9d646df54a7d7c66e198aa22c7d293c7453534f1670f7c540534db8b5e"
mickey_dotfiles_tmux_bin_path: /usr/local/bin/tmux
mickey_dotfiles_tmux_plugin_root: "{{ mickey_guest_admin_home }}/.tmux/plugins"
mickey_dotfiles_tmux_plugins:
  - name: tpm
    repo: https://github.com/tmux-plugins/tpm.git
  - name: tmux-sensible
    repo: https://github.com/tmux-plugins/tmux-sensible.git
  - name: vim-tmux-navigator
    repo: https://github.com/christoomey/vim-tmux-navigator.git
  - name: catppuccin-tmux
    repo: https://github.com/dreamsofcode-io/catppuccin-tmux.git
  - name: tmux-yank
    repo: https://github.com/tmux-plugins/tmux-yank.git
mickey_dotfiles_starship_version: "1.25.0"
mickey_dotfiles_starship_asset_name: starship-x86_64-unknown-linux-musl.tar.gz
mickey_dotfiles_starship_archive_url: "https://github.com/starship/starship/releases/download/v{{ mickey_dotfiles_starship_version }}/{{ mickey_dotfiles_starship_asset_name }}"
mickey_dotfiles_starship_bin_path: /usr/local/bin/starship
