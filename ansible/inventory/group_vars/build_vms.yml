mickey_build_apt_packages:
  - bubblewrap
  - ca-certificates
  - cifs-utils
  - curl
  - git
  - openssh-server
  - qemu-guest-agent
  - xz-utils

mickey_build_enable_repo_clones: true
mickey_build_repo_root: "/home/{{ mickey_guest_admin_user }}/Projects"
mickey_build_share_mount_path: "{{ mickey_shared_mount_path }}"
mickey_build_share_name: mickey-share
mickey_build_share_server: "{{ hostvars['mickey-infra'].ansible_host | default('10.25.1.206') }}"
mickey_build_share_credentials_path: /etc/mickey-platform/mickey-infra-share.credentials
mickey_build_share_fstab_options: "credentials={{ mickey_build_share_credentials_path }},uid={{ mickey_guest_admin_user }},gid={{ mickey_guest_admin_user }},vers=3.0,file_mode=0660,dir_mode=0770,mfsymlinks,_netdev,nofail,x-systemd.automount"
mickey_build_share_mount_command: /usr/local/bin/mickey-share-mount
mickey_build_share_umount_command: /usr/local/bin/mickey-share-umount
mickey_build_yocto_diagnose_command: /usr/local/bin/mickey-yocto-fetch-diagnose
mickey_build_yocto_target_url: http://downloads.yoctoproject.org/mirror/sources/git2_github.com.intel.linux-intel-lts.git.tar.gz
mickey_build_yocto_control_url: https://speed.cloudflare.com/__down?bytes=20000000
mickey_build_git_repos:
  - name: "accuchrome-gc5-wl"
    url: "git@github.com:GalvanicAppliedSciences/accuchrome-gc5-wl.git"
  - name: "Acculase6"
    url: "git@github.com:GalvanicAppliedSciences/Acculase6.git"
  - name: "Yocto-Thud-Documentation"
    url: "git@github.com:GalvanicAppliedSciences/Yocto-Thud-Documentation.git"
