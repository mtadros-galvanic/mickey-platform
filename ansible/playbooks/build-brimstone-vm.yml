---
- name: Bootstrap the Mickey brimstone build VM
  hosts: mickey-brimstone
  become: true
  gather_facts: false

  vars:
    mickey_build_share_mount_username: "{{ (samba.username | default(mickey_guest_admin_user)) if (samba is defined) else mickey_guest_admin_user }}"
    mickey_codex_node_version: "24.15.0"
    mickey_build_apt_packages:
      - bubblewrap
      - build-essential
      - ca-certificates
      - cifs-utils
      - chrpath
      - cpio
      - curl
      - debianutils
      - device-tree-compiler
      - diffstat
      - file
      - gawk
      - gcc
      - git
      - iputils-ping
      - libacl1
      - liblz4-tool
      - locales
      - minicom
      - openssh-server
      - python3
      - python3-git
      - python3-jinja2
      - python3-pexpect
      - python3-pip
      - python3-subunit
      - qemu-guest-agent
      - screen
      - socat
      - texinfo
      - tree
      - unzip
      - wget
      - xz-utils
      - zstd
      - android-tools-fastboot
      - android-tools-adb
    mickey_build_git_repos:
      - name: "brimestone"
        url: "git@github.com:GalvanicAppliedSciences/brimestone.git"
      - name: "Protech"
        url: "git@github.com:GalvanicAppliedSciences/Protech.git"

  handlers:
    - name: Validate Consul client config
      ansible.builtin.raw: |
        consul validate {{ mickey_consul_config_dir_effective | quote }}

    - name: Restart Consul client
      ansible.builtin.raw: |
        systemctl restart consul

  tasks:
    - name: Run the shared build VM bootstrap for mickey-brimstone
      ansible.builtin.include_tasks: ../tasks/bootstrap-build-vm.yml
