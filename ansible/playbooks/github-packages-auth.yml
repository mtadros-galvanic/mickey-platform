---
- name: Configure Galvanic GitHub Packages auth on Mickey guests
  hosts: guest_vms
  become: true
  gather_facts: false

  vars:
    ansible_python_interpreter: "{{ '/opt/mickey-python/cpython-3.12.13+20260610/bin/python3.12' if inventory_hostname == 'mickey-thud' else '/usr/bin/python3' }}"

  pre_tasks:
    - name: Load secrets if provided
      ansible.builtin.include_vars:
        file: "{{ secret_vars_file }}"
      when: secret_vars_file is defined
      no_log: true

  tasks:
    - name: Configure Galvanic GitHub Packages auth
      ansible.builtin.include_tasks: ../tasks/configure-github-packages-auth.yml
