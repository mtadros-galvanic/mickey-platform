---
- name: Bootstrap the Mickey infra VM
  hosts: infra_vms
  become: true
  gather_facts: true

  vars:
    mickey_guest_admin_password_hash: "{{ guests.admin_password_hash | default(guests.desktop_admin_password_hash | default('')) if (guests is defined) else '' }}"
    mickey_samba_username: "{{ (samba.username | default(mickey_guest_admin_user)) if (samba is defined) else mickey_guest_admin_user }}"
    mickey_codex_node_version: "24.15.0"

  pre_tasks:
    - name: Load secrets if provided
      ansible.builtin.include_vars:
        file: "{{ secret_vars_file }}"
      when: secret_vars_file is defined

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd_service:
        daemon_reload: true

    - name: Restart smbd
      ansible.builtin.service:
        name: smbd
        state: restarted

    - name: Restart caddy
      ansible.builtin.service:
        name: caddy
        state: restarted

    - name: Restart dnsmasq
      ansible.builtin.service:
        name: dnsmasq
        state: restarted

  tasks:
    - name: Apply the shared VM base layer to the infra guest
      ansible.builtin.include_tasks: ../tasks/bootstrap-vm-base.yml

    - name: Install Caddy without auto-starting the default site
      ansible.builtin.apt:
        name: caddy
        state: present
        policy_rc_d: 101

    - name: Install a placeholder Caddyfile that does not bind public ports
      ansible.builtin.copy:
        dest: /etc/caddy/Caddyfile
        owner: root
        group: root
        mode: "0644"
        content: |
          {
              admin off
          }

          # Managed by Ansible.
          # This placeholder keeps Caddy installed on mickey-infra without
          # binding public ports until a real site configuration is added.
      notify: Restart caddy

    - name: Ensure Caddy is enabled and running with the placeholder config
      ansible.builtin.service:
        name: caddy
        state: started
        enabled: true

    - name: Ensure the bootstrap user's SSH directory exists for GitHub access
      ansible.builtin.file:
        path: "/home/{{ mickey_guest_admin_user }}/.ssh"
        state: directory
        owner: "{{ mickey_guest_admin_user }}"
        group: "{{ mickey_guest_admin_user }}"
        mode: "0700"

    - name: Install the GitHub SSH key for the infra guest
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/ssh/mt-github"
        dest: "/home/{{ mickey_guest_admin_user }}/.ssh/mt-github"
        owner: "{{ mickey_guest_admin_user }}"
        group: "{{ mickey_guest_admin_user }}"
        mode: "0600"

    - name: Install the managed Mickey SSH config fragment for the infra guest
      ansible.builtin.include_tasks: ../tasks/configure-ssh-client-managed-fragment.yml
      vars:
        mickey_ssh_client_managed_fragment_content: "{{ lookup('ansible.builtin.file', playbook_dir ~ '/../files/ssh/mickey-infra/config') }}"

    - name: Ensure GitHub is trusted for SSH repo access on the infra guest
      ansible.builtin.shell: |
        touch /home/{{ mickey_guest_admin_user }}/.ssh/known_hosts
        chown {{ mickey_guest_admin_user | quote }}:{{ mickey_guest_admin_user | quote }} /home/{{ mickey_guest_admin_user }}/.ssh/known_hosts
        chmod 0600 /home/{{ mickey_guest_admin_user }}/.ssh/known_hosts
        if ! ssh-keygen -F github.com -f /home/{{ mickey_guest_admin_user }}/.ssh/known_hosts >/dev/null 2>&1; then
          ssh-keyscan -H github.com >> /home/{{ mickey_guest_admin_user }}/.ssh/known_hosts
        fi
      args:
        executable: /bin/bash
      changed_when: false

    - name: Configure infra as the Mickey DNS resolver
      ansible.builtin.copy:
        dest: /etc/dnsmasq.d/mickey-internal.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          # Managed by Ansible.
          # Serve Mickey application names locally and forward other LAN names.
          interface=eth0
          listen-address=127.0.0.1,{{ ansible_host }}
          bind-interfaces
          domain-needed
          bogus-priv
          no-resolv
          no-hosts
          local=/mickey.galvanic.com/
          address=/.mickey.galvanic.com/{{ ansible_host }}
          server=/galvanic.local/10.25.1.21
          server=1.1.1.1
          server=9.9.9.9
      notify: Restart dnsmasq

    - name: Ensure dnsmasq starts after the infra address is ready
      ansible.builtin.copy:
        dest: /etc/systemd/system/dnsmasq.service.d/mickey-network-online.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          # Managed by Mickey platform.
          [Unit]
          Wants=network-online.target
          After=network-online.target

          [Service]
          Restart=on-failure
          RestartSec=5s
      notify:
        - Reload systemd
        - Restart dnsmasq

    - name: Ensure dnsmasq is enabled and running
      ansible.builtin.service:
        name: dnsmasq
        state: started
        enabled: true

    - name: Add the bootstrap user to the docker group
      ansible.builtin.user:
        name: "{{ mickey_guest_admin_user }}"
        groups: docker
        append: true

    - name: Enable guest-facing services
      ansible.builtin.service:
        name: "{{ item }}"
        state: started
        enabled: true
      loop:
        - docker
        - qemu-guest-agent
        - smbd

    - name: Detect the root filesystem source
      ansible.builtin.command: findmnt -n -o SOURCE /
      register: mickey_root_source
      changed_when: false

    - name: Detect the root parent disk
      ansible.builtin.command: "lsblk -no pkname {{ mickey_root_source.stdout | trim }}"
      register: mickey_root_parent_disk
      changed_when: false

    - name: Inspect the current share mount source
      ansible.builtin.command: "findmnt -n -o SOURCE --target {{ mickey_share_mount_path }}"
      register: mickey_share_mount_source
      changed_when: false
      failed_when: false

    - name: Detect the parent disk for the mounted share volume
      ansible.builtin.command: "lsblk -no pkname {{ mickey_share_mount_source.stdout | trim }}"
      register: mickey_share_parent_disk
      changed_when: false
      when: mickey_share_mount_source.stdout | trim != ""

    - name: Reuse the currently mounted share disk when present
      ansible.builtin.set_fact:
        mickey_infra_data_partition_device: "{{ mickey_share_mount_source.stdout | trim }}"
        mickey_infra_data_disk_device: "/dev/{{ mickey_share_parent_disk.stdout | trim }}"
      when: mickey_share_mount_source.stdout | trim != ""

    - name: Detect non-root block disk candidates
      ansible.builtin.shell: |
        lsblk -dn -o NAME,TYPE,FSTYPE,LABEL \
          | awk '$2 == "disk" && $3 != "iso9660" && $4 != "cidata" { print $1 }' \
          | grep -vx "{{ mickey_root_parent_disk.stdout | trim }}"
      args:
        executable: /bin/bash
      register: mickey_data_disk_candidates
      changed_when: false
      failed_when: false
      when: mickey_share_mount_source.stdout | trim == ""

    - name: Fail when the infra data disk cannot be identified uniquely
      ansible.builtin.fail:
        msg: "Expected exactly one non-root disk for the infra share volume, found: {{ mickey_data_disk_candidates.stdout_lines | default([]) }}"
      when:
        - mickey_share_mount_source.stdout | trim == ""
        - (mickey_data_disk_candidates.stdout_lines | default([]) | length) != 1

    - name: Set the infra data disk path
      ansible.builtin.set_fact:
        mickey_infra_data_disk_device: "/dev/{{ mickey_data_disk_candidates.stdout_lines[0] }}"
        mickey_infra_data_partition_device: "/dev/{{ mickey_data_disk_candidates.stdout_lines[0] }}1"
      when: mickey_share_mount_source.stdout | trim == ""
    - name: Inspect the infra data disk partition table
      ansible.builtin.command: "parted -s {{ mickey_infra_data_disk_device }} print"
      register: mickey_infra_parted_print
      changed_when: false
      failed_when: false

    - name: Create a GPT label on the infra data disk
      ansible.builtin.command: "parted -s {{ mickey_infra_data_disk_device }} mklabel gpt"
      when: "'Partition Table: gpt' not in mickey_infra_parted_print.stdout"

    - name: Create the infra data partition when missing
      ansible.builtin.shell: |
        if lsblk {{ mickey_infra_data_partition_device }} >/dev/null 2>&1; then
          echo present
        else
          parted -s {{ mickey_infra_data_disk_device }} mkpart primary ext4 1MiB 100%
          echo created
        fi
      args:
        executable: /bin/bash
      register: mickey_infra_partition_create
      changed_when: "'created' in mickey_infra_partition_create.stdout"

    - name: Detect the filesystem on the infra data partition
      ansible.builtin.command: "blkid -o value -s TYPE {{ mickey_infra_data_partition_device }}"
      register: mickey_infra_fs_type
      changed_when: false
      failed_when: false

    - name: Create the ext4 filesystem on the infra data partition
      ansible.builtin.command: "mkfs.ext4 -F -L mickey-share {{ mickey_infra_data_partition_device }}"
      when: mickey_infra_fs_type.stdout | trim != "ext4"

    - name: Ensure the share mount path exists
      ansible.builtin.file:
        path: "{{ mickey_share_mount_path }}"
        state: directory
        mode: "0770"

    - name: Read the infra data partition UUID
      ansible.builtin.command: "blkid -o value -s UUID {{ mickey_infra_data_partition_device }}"
      register: mickey_infra_uuid
      changed_when: false

    - name: Persist the share mount in fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: "^UUID=.*\\s+{{ mickey_share_mount_path | regex_escape() }}\\s"
        line: "UUID={{ mickey_infra_uuid.stdout | trim }} {{ mickey_share_mount_path }} ext4 defaults,noatime 0 2"

    - name: Mount the infra share filesystem
      ansible.builtin.shell: |
        if mountpoint -q {{ mickey_share_mount_path }}; then
          echo mounted
        else
          mount {{ mickey_share_mount_path }}
          echo changed
        fi
      args:
        executable: /bin/bash
      register: mickey_infra_mount_result
      changed_when: "'changed' in mickey_infra_mount_result.stdout"

    - name: Ensure the shared alias mount path exists on the infra guest
      ansible.builtin.file:
        path: "{{ mickey_share_alias_mount_path }}"
        state: directory
        mode: "0755"

    - name: Persist the shared alias bind mount in fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: "^{{ mickey_share_mount_path | regex_escape() }}\\s+{{ mickey_share_alias_mount_path | regex_escape() }}\\s+none\\s"
        line: "{{ mickey_share_mount_path }} {{ mickey_share_alias_mount_path }} none defaults,bind 0 0"

    - name: Mount the shared alias path on the infra guest
      ansible.builtin.shell: |
        if mountpoint -q {{ mickey_share_alias_mount_path | quote }}; then
          exit 0
        fi
        mount {{ mickey_share_alias_mount_path | quote }}
      args:
        executable: /bin/bash
      changed_when: false

    - name: Inspect the current fast share mount source
      ansible.builtin.command: "findmnt -n -o SOURCE --target {{ mickey_fast_share_mount_path }}"
      register: mickey_fast_share_mount_source
      changed_when: false
      failed_when: false

    - name: Detect the parent disk for the mounted fast share volume
      ansible.builtin.command: "lsblk -no pkname {{ mickey_fast_share_mount_source.stdout | trim }}"
      register: mickey_fast_share_parent_disk
      changed_when: false
      when: mickey_fast_share_mount_source.stdout | trim != ""

    - name: Reuse the currently mounted fast share disk when present
      ansible.builtin.set_fact:
        mickey_infra_fast_partition_device: "{{ mickey_fast_share_mount_source.stdout | trim }}"
        mickey_infra_fast_disk_device: "/dev/{{ mickey_fast_share_parent_disk.stdout | trim }}"
      when: mickey_fast_share_mount_source.stdout | trim != ""

    - name: Detect non-root block disk candidates for the fast share
      ansible.builtin.shell: |
        root_disk={{ mickey_root_parent_disk.stdout | trim | quote }}
        bulk_disk="$(basename {{ mickey_infra_data_disk_device | quote }})"
        lsblk -dn -o NAME,TYPE,FSTYPE,LABEL \
          | awk '$2 == "disk" && $3 != "iso9660" && $4 != "cidata" { print $1 }' \
          | grep -vx "$root_disk" \
          | grep -vx "$bulk_disk"
      args:
        executable: /bin/bash
      register: mickey_fast_disk_candidates
      changed_when: false
      failed_when: false
      when: mickey_fast_share_mount_source.stdout | trim == ""

    - name: Fail when the infra fast share disk cannot be identified uniquely
      ansible.builtin.fail:
        msg: "Expected exactly one non-root, non-bulk disk for the fast share volume, found: {{ mickey_fast_disk_candidates.stdout_lines | default([]) }}"
      when:
        - mickey_fast_share_mount_source.stdout | trim == ""
        - (mickey_fast_disk_candidates.stdout_lines | default([]) | length) != 1

    - name: Set the infra fast share disk path
      ansible.builtin.set_fact:
        mickey_infra_fast_disk_device: "/dev/{{ mickey_fast_disk_candidates.stdout_lines[0] }}"
        mickey_infra_fast_partition_device: "/dev/{{ mickey_fast_disk_candidates.stdout_lines[0] }}1"
      when: mickey_fast_share_mount_source.stdout | trim == ""

    - name: Inspect the infra fast share disk partition table
      ansible.builtin.command: "parted -s {{ mickey_infra_fast_disk_device }} print"
      register: mickey_infra_fast_parted_print
      changed_when: false
      failed_when: false

    - name: Create a GPT label on the infra fast share disk
      ansible.builtin.command: "parted -s {{ mickey_infra_fast_disk_device }} mklabel gpt"
      when: "'Partition Table: gpt' not in mickey_infra_fast_parted_print.stdout"

    - name: Create the infra fast share partition when missing
      ansible.builtin.shell: |
        if lsblk {{ mickey_infra_fast_partition_device }} >/dev/null 2>&1; then
          echo present
        else
          parted -s {{ mickey_infra_fast_disk_device }} mkpart primary ext4 1MiB 100%
          echo created
        fi
      args:
        executable: /bin/bash
      register: mickey_infra_fast_partition_create
      changed_when: "'created' in mickey_infra_fast_partition_create.stdout"

    - name: Detect the filesystem on the infra fast share partition
      ansible.builtin.command: "blkid -o value -s TYPE {{ mickey_infra_fast_partition_device }}"
      register: mickey_infra_fast_fs_type
      changed_when: false
      failed_when: false

    - name: Create the ext4 filesystem on the infra fast share partition
      ansible.builtin.command: "mkfs.ext4 -F -L {{ mickey_fast_share_label }} {{ mickey_infra_fast_partition_device }}"
      when: mickey_infra_fast_fs_type.stdout | trim != "ext4"

    - name: Ensure the fast share mount path exists
      ansible.builtin.file:
        path: "{{ mickey_fast_share_mount_path }}"
        state: directory
        mode: "0770"

    - name: Read the infra fast share partition UUID
      ansible.builtin.command: "blkid -o value -s UUID {{ mickey_infra_fast_partition_device }}"
      register: mickey_infra_fast_uuid
      changed_when: false

    - name: Persist the fast share mount in fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: "^UUID=.*\\s+{{ mickey_fast_share_mount_path | regex_escape() }}\\s"
        line: "UUID={{ mickey_infra_fast_uuid.stdout | trim }} {{ mickey_fast_share_mount_path }} ext4 defaults,noatime 0 2"

    - name: Mount the infra fast share filesystem
      ansible.builtin.shell: |
        if mountpoint -q {{ mickey_fast_share_mount_path }}; then
          echo mounted
        else
          mount {{ mickey_fast_share_mount_path }}
          echo changed
        fi
      args:
        executable: /bin/bash
      register: mickey_infra_fast_mount_result
      changed_when: "'changed' in mickey_infra_fast_mount_result.stdout"

    - name: Ensure the fast shared alias mount path exists on the infra guest
      ansible.builtin.file:
        path: "{{ mickey_fast_share_alias_mount_path }}"
        state: directory
        mode: "0755"

    - name: Persist the fast shared alias bind mount in fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: "^{{ mickey_fast_share_mount_path | regex_escape() }}\\s+{{ mickey_fast_share_alias_mount_path | regex_escape() }}\\s+none\\s"
        line: "{{ mickey_fast_share_mount_path }} {{ mickey_fast_share_alias_mount_path }} none defaults,bind 0 0"

    - name: Mount the fast shared alias path on the infra guest
      ansible.builtin.shell: |
        if mountpoint -q {{ mickey_fast_share_alias_mount_path | quote }}; then
          exit 0
        fi
        mount {{ mickey_fast_share_alias_mount_path | quote }}
      args:
        executable: /bin/bash
      changed_when: false

    - name: Ensure the Samba user exists as a local account
      ansible.builtin.user:
        name: "{{ mickey_samba_username }}"
        groups: sambashare
        append: true

    - name: Ensure the share path has the expected ownership
      ansible.builtin.file:
        path: "{{ mickey_share_mount_path }}"
        state: directory
        owner: "{{ mickey_samba_username }}"
        group: sambashare
        mode: "0770"

    - name: Ensure the fast share path has the expected ownership
      ansible.builtin.file:
        path: "{{ mickey_fast_share_mount_path }}"
        state: directory
        owner: "{{ mickey_samba_username }}"
        group: sambashare
        mode: "0770"

    - name: Seed the fast Codex tree from the legacy bulk share when empty
      ansible.builtin.shell: |
        source={{ mickey_codex_legacy_shared_root | quote }}
        dest={{ mickey_codex_shared_root | quote }}
        parent="$(dirname "$dest")"
        marker="$dest/.seeded-from-legacy"

        if [ ! -d "$source" ]; then
          exit 0
        fi

        install -d -m 0770 -o {{ mickey_samba_username | quote }} -g sambashare "$parent"
        if [ -f "$marker" ]; then
          exit 0
        fi

        rm -rf "$dest"
        install -d -m 0770 -o {{ mickey_samba_username | quote }} -g sambashare "$dest"
        tar \
          --exclude='./hosts/*/.tmp' \
          --exclude='./hosts/*/cache' \
          --exclude='./hosts/*/log' \
          --exclude='./hosts/*/sessions' \
          --exclude='./hosts/*/shell_snapshots' \
          --exclude='./hosts/*/tmp' \
          --exclude='./hosts/*/plugins' \
          -C "$source" -cf - . | tar -C "$dest" -xf -
        touch "$marker"
        chown -R {{ mickey_samba_username | quote }}:sambashare "$dest"
        echo changed
      args:
        executable: /bin/bash
      register: mickey_fast_codex_seed_result
      changed_when: "'changed' in mickey_fast_codex_seed_result.stdout"

    - name: Ensure the Codex shared paths exist on the share
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ mickey_samba_username }}"
        group: sambashare
        mode: "0770"
      loop:
        - "{{ mickey_codex_shared_root }}"
        - "{{ mickey_codex_hosts_root }}"
        - "{{ mickey_codex_shared_skills_path }}"

    - name: Install the Samba configuration
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/smb.conf.j2"
        dest: /etc/samba/smb.conf
        owner: root
        group: root
        mode: "0644"
      notify: Restart smbd

    - name: Configure the Samba password
      ansible.builtin.shell: |
        export SAMBA_PASSWORD={{ samba.password | quote }}
        if pdbedit -L -u {{ mickey_samba_username }} >/dev/null 2>&1; then
          printf '%s\n%s\n' "$SAMBA_PASSWORD" "$SAMBA_PASSWORD" | smbpasswd -s {{ mickey_samba_username }}
        else
          printf '%s\n%s\n' "$SAMBA_PASSWORD" "$SAMBA_PASSWORD" | smbpasswd -s -a {{ mickey_samba_username }}
        fi
        smbpasswd -e {{ mickey_samba_username }} >/dev/null 2>&1 || true
      args:
        executable: /bin/bash
      when:
        - samba is defined
        - samba.password is defined
      changed_when: false

    - name: Apply the shared VM admin tooling layer to the infra guest
      ansible.builtin.include_tasks: ../tasks/configure-vm-admin-tooling.yml
