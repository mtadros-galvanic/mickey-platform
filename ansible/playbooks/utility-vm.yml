---
- name: Bootstrap the Mickey utility VMs
  hosts: utility_vms
  become: true
  gather_facts: true

  vars:
    mickey_guest_admin_password_hash: "{{ guests.admin_password_hash | default(guests.extra_vm_admin_password_hash | default('')) if (guests is defined) else '' }}"
    mickey_guest_fqdn: "{{ inventory_hostname }}.galvanic.local"
    mickey_utility_share_mount_username: "{{ (samba.username | default(mickey_guest_admin_user)) if (samba is defined) else mickey_guest_admin_user }}"
    mickey_codex_node_version: "24.15.0"

  pre_tasks:
    - name: Load secrets if provided
      ansible.builtin.include_vars:
        file: "{{ secret_vars_file }}"
      when: secret_vars_file is defined

    - name: Fail when the Samba password is missing for the utility share mount
      ansible.builtin.fail:
        msg: "samba.password must be present in the secrets file to configure the utility share mount."
      when: >-
        samba is not defined
        or samba.password is not defined
        or (samba.password | string | length) == 0

  tasks:
    - name: Install utility baseline packages
      ansible.builtin.apt:
        name: "{{ mickey_utility_apt_packages }}"
        state: present
        update_cache: true

    - name: Ensure the bootstrap user is configured
      ansible.builtin.include_tasks: ../tasks/bootstrap-admin-user.yml

    - name: Set the utility hostname
      ansible.builtin.hostname:
        name: "{{ inventory_hostname }}"

    - name: Ensure the utility hosts file has the expected local hostname mapping
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '^127\\.0\\.1\\.1\\s+'
        line: "127.0.1.1 {{ mickey_guest_fqdn }} {{ inventory_hostname }}"

    - name: Ensure the utility share mount path exists
      ansible.builtin.file:
        path: "{{ mickey_utility_share_mount_path }}"
        state: directory
        owner: "{{ mickey_guest_admin_user }}"
        group: "{{ mickey_guest_admin_user }}"
        mode: "0770"

    - name: Ensure the utility fast share mount path exists
      ansible.builtin.file:
        path: "{{ mickey_utility_fast_share_mount_path }}"
        state: directory
        owner: "{{ mickey_guest_admin_user }}"
        group: "{{ mickey_guest_admin_user }}"
        mode: "0770"

    - name: Ensure the utility share credential directory exists
      ansible.builtin.file:
        path: /etc/mickey-platform
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Install the utility share credentials file
      ansible.builtin.copy:
        dest: "{{ mickey_utility_share_credentials_path }}"
        content: |-
          username={{ mickey_utility_share_mount_username }}
          password={{ samba.password }}
        owner: root
        group: root
        mode: "0600"
      no_log: true

    - name: Persist the utility share automount in fstab
      ansible.builtin.raw: |
        set -eu
        line="//{{ mickey_utility_share_server }}/{{ mickey_utility_share_name }} {{ mickey_utility_share_mount_path }} cifs {{ mickey_utility_share_fstab_options }} 0 0"
        tmp="$(mktemp)"
        trap 'rm -f "$tmp"' EXIT
        current_count="$(grep -Fc " {{ mickey_utility_share_mount_path }} cifs " /etc/fstab || true)"

        if grep -Fqx "$line" /etc/fstab && [ "$current_count" -eq 1 ]; then
          exit 0
        fi

        grep -v " {{ mickey_utility_share_mount_path }} cifs " /etc/fstab > "$tmp" || true
        printf '%s\n' "$line" >> "$tmp"
        cat "$tmp" > /etc/fstab
        systemctl daemon-reload
        echo changed
      register: mickey_utility_share_fstab_result
      changed_when: "'changed' in mickey_utility_share_fstab_result.stdout"

    - name: Persist the utility fast share automount in fstab
      ansible.builtin.raw: |
        set -eu
        line="//{{ mickey_utility_fast_share_server }}/{{ mickey_utility_fast_share_name }} {{ mickey_utility_fast_share_mount_path }} cifs {{ mickey_utility_fast_share_fstab_options }} 0 0"
        tmp="$(mktemp)"
        trap 'rm -f "$tmp"' EXIT
        current_count="$(grep -Fc " {{ mickey_utility_fast_share_mount_path }} cifs " /etc/fstab || true)"

        if grep -Fqx "$line" /etc/fstab && [ "$current_count" -eq 1 ]; then
          exit 0
        fi

        grep -v " {{ mickey_utility_fast_share_mount_path }} cifs " /etc/fstab > "$tmp" || true
        printf '%s\n' "$line" >> "$tmp"
        cat "$tmp" > /etc/fstab
        systemctl daemon-reload
        echo changed
      register: mickey_utility_fast_share_fstab_result
      changed_when: "'changed' in mickey_utility_fast_share_fstab_result.stdout"

    - name: Reload systemd to pick up the utility automount
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable guest-facing services
      ansible.builtin.service:
        name: "{{ item }}"
        state: started
        enabled: true
      loop:
        - qemu-guest-agent

    - name: Mount the utility share now that the fstab entry exists
      ansible.builtin.shell: |
        mount_point={{ mickey_utility_share_mount_path | quote }}
        if mountpoint -q "$mount_point"; then
          options="$(findmnt -no OPTIONS --target "$mount_point" || true)"
          if printf '%s\n' "$options" | grep -qw mfsymlinks; then
            mount -o remount "$mount_point"
            exit 0
          fi
          umount "$mount_point"
        fi
        mount "$mount_point"
      args:
        executable: /bin/bash
      changed_when: false

    - name: Mount the utility fast share now that the fstab entry exists
      ansible.builtin.shell: |
        mount_point={{ mickey_utility_fast_share_mount_path | quote }}
        if mountpoint -q "$mount_point"; then
          options="$(findmnt -no OPTIONS --target "$mount_point" || true)"
          if printf '%s\n' "$options" | grep -qw mfsymlinks; then
            mount -o remount "$mount_point"
            exit 0
          fi
          umount "$mount_point"
        fi
        mount "$mount_point"
      args:
        executable: /bin/bash
      changed_when: false

    - name: Install Codex tooling for the utility guest
      ansible.builtin.include_tasks: ../tasks/install-codex-cli.yml

    - name: Point the utility guest at the shared Codex auth file when present
      ansible.builtin.include_tasks: ../tasks/configure-codex-auth.yml

    - name: Publish fd on PATH for Ubuntu guests
      ansible.builtin.file:
        src: /usr/bin/fdfind
        dest: /usr/local/bin/fd
        state: link
        force: true
      when: "'fd-find' in mickey_utility_apt_packages"

    - name: Install the curated admin dotfiles on the utility guest
      ansible.builtin.include_tasks: ../tasks/configure-admin-dotfiles.yml

    - name: Sync the Mickey projects tree onto utility guests
      ansible.builtin.include_tasks: ../tasks/sync-utility-projects.yml
      when: mickey_utility_projects_sync_enable | default(false) | bool
