---
- name: Ensure the local Codex home exists
  ansible.builtin.file:
    path: "{{ mickey_codex_local_home }}"
    state: directory
    owner: "{{ mickey_guest_admin_user }}"
    group: "{{ mickey_guest_admin_user }}"
    mode: "0700"
  when: mickey_codex_enable | default(false) | bool

- name: Seed the shared Codex home from the legacy shell path when moving to mickey-share
  ansible.builtin.raw: |
    set -eu
    shell_home={{ mickey_codex_shell_home | quote }}
    codex_home={{ mickey_codex_local_home | quote }}
    shell_source="$(readlink -f "$shell_home" 2>/dev/null || true)"

    if [ -z "$shell_source" ]; then
      shell_source="$shell_home"
    fi

    if [ "$shell_source" = "$codex_home" ]; then
      exit 0
    fi

    install -d -m 0700 -o {{ mickey_guest_admin_user | quote }} -g {{ mickey_guest_admin_user | quote }} "$codex_home"

    if [ -d "$shell_source" ]; then
      if [ -z "$(find "$codex_home" -mindepth 1 -maxdepth 1 -print -quit 2>/dev/null)" ]; then
        cd "$shell_source"
        for entry in .[!.]* ..?* *; do
          [ -e "$entry" ] || continue
          [ -L "$entry" ] && continue
          case "$entry" in
            .tmp|tmp|cache|shell_snapshots|logs_2.sqlite|logs_2.sqlite-shm|logs_2.sqlite-wal|state_5.sqlite|state_5.sqlite-shm|state_5.sqlite-wal|models_cache.json|auth.json|skills|auth.json.local-backup|skills.local-backup)
              continue
              ;;
          esac
          cp -R --no-preserve=mode,ownership,timestamps "$entry" "$codex_home"/
        done
        chown -R {{ mickey_guest_admin_user | quote }}:{{ mickey_guest_admin_user | quote }} "$codex_home"
        echo changed
      fi
    fi
  register: mickey_codex_seed_home_result
  changed_when: "'changed' in mickey_codex_seed_home_result.stdout"
  when: mickey_codex_enable | default(false) | bool

- name: Point the shell-visible .codex path at the shared Codex home
  ansible.builtin.raw: |
    set -eu
    shell_home={{ mickey_codex_shell_home | quote }}
    codex_home={{ mickey_codex_local_home | quote }}
    backup_home={{ mickey_codex_shell_backup_home | quote }}

    if [ "$shell_home" = "$codex_home" ]; then
      exit 0
    fi

    if [ -L "$shell_home" ] && [ "$(readlink "$shell_home")" = "$codex_home" ]; then
      exit 0
    fi

    if [ -e "$shell_home" ] && [ ! -L "$shell_home" ]; then
      rm -rf "$backup_home"
      mv "$shell_home" "$backup_home"
    else
      rm -f "$shell_home"
    fi
    ln -s "$codex_home" "$shell_home"
    chown -h {{ mickey_guest_admin_user | quote }}:{{ mickey_guest_admin_user | quote }} "$shell_home"
    echo changed
  register: mickey_codex_shell_link_result
  changed_when: "'changed' in mickey_codex_shell_link_result.stdout"
  when: mickey_codex_enable | default(false) | bool

- name: Detect whether the shared Codex auth file exists
  ansible.builtin.raw: |
    if [ -f {{ mickey_codex_shared_auth_path | quote }} ]; then
      echo present
    fi
  register: mickey_codex_shared_auth_probe
  changed_when: false
  when: mickey_codex_enable | default(false) | bool
    and (mickey_codex_shared_auth_enable | default(false) | bool)

- name: Point the local Codex auth file at the shared auth copy when available
  ansible.builtin.raw: |
    set -eu
    shared_auth={{ mickey_codex_shared_auth_path | quote }}
    local_auth={{ mickey_codex_local_auth_path | quote }}
    backup_auth={{ mickey_codex_local_auth_backup_path | quote }}

    if [ -L "$local_auth" ] && [ "$(readlink "$local_auth")" = "$shared_auth" ]; then
      exit 0
    fi

    if [ -e "$local_auth" ] && [ ! -L "$local_auth" ]; then
      if [ ! -e "$backup_auth" ]; then
        mv "$local_auth" "$backup_auth"
      else
        rm -f "$local_auth"
      fi
    else
      rm -f "$local_auth"
    fi

    ln -s "$shared_auth" "$local_auth"
    chown -h {{ mickey_guest_admin_user | quote }}:{{ mickey_guest_admin_user | quote }} "$local_auth"
    echo changed
  register: mickey_codex_auth_link_result
  changed_when: "'changed' in mickey_codex_auth_link_result.stdout"
  when:
    - mickey_codex_enable | default(false) | bool
    - mickey_codex_shared_auth_enable | default(false) | bool
    - mickey_codex_shared_auth_probe.stdout | trim == "present"

- name: Reconcile the local Codex auth path with the shared auth copy
  ansible.builtin.raw: |
    set -eu
    shared_auth={{ mickey_codex_shared_auth_path | quote }}
    local_auth={{ mickey_codex_local_auth_path | quote }}
    before_auth=""
    after_auth=""
    before_link="$(readlink "$local_auth" 2>/dev/null || true)"

    if [ -f "$shared_auth" ]; then
      before_auth="$(sha256sum "$shared_auth" | awk '{print $1}')"
    fi

    {{ mickey_codex_sync_script_path }}

    after_link="$(readlink "$local_auth" 2>/dev/null || true)"
    if [ -f "$shared_auth" ]; then
      after_auth="$(sha256sum "$shared_auth" | awk '{print $1}')"
    fi

    if [ "$before_auth" != "$after_auth" ] || [ "$before_link" != "$after_link" ]; then
      echo changed
    fi
  register: mickey_codex_auth_sync_result
  changed_when: "'changed' in mickey_codex_auth_sync_result.stdout"
  when:
    - mickey_codex_enable | default(false) | bool
    - mickey_codex_shared_auth_enable | default(false) | bool

- name: Ensure the shared Codex skills directory exists
  ansible.builtin.file:
    path: "{{ mickey_codex_shared_skills_path }}"
    state: directory
    owner: "{{ mickey_guest_admin_user }}"
    group: "{{ mickey_guest_admin_user }}"
    mode: "0770"
  when:
    - mickey_codex_enable | default(false) | bool
    - mickey_codex_shared_auth_enable | default(false) | bool

- name: Replace legacy host-private Codex skills symlink with a directory
  ansible.builtin.raw: |
    set -eu
    private_skills={{ mickey_codex_private_skills_path | quote }}

    if [ -L "$private_skills" ]; then
      rm -f "$private_skills"
      install -d -m 0770 -o {{ mickey_guest_admin_user | quote }} -g {{ mickey_guest_admin_user | quote }} "$private_skills"
      echo changed
    fi
  register: mickey_codex_private_skills_normalize_result
  changed_when: "'changed' in mickey_codex_private_skills_normalize_result.stdout"
  when:
    - mickey_codex_enable | default(false) | bool
    - mickey_codex_shared_auth_enable | default(false) | bool

- name: Ensure the host-private Codex skills directory exists
  ansible.builtin.file:
    path: "{{ mickey_codex_private_skills_path }}"
    state: directory
    owner: "{{ mickey_guest_admin_user }}"
    group: "{{ mickey_guest_admin_user }}"
    mode: "0770"
  when:
    - mickey_codex_enable | default(false) | bool
    - mickey_codex_shared_auth_enable | default(false) | bool

- name: Seed the shared Codex skills directory from the local guest copy when it is empty
  ansible.builtin.raw: |
    set -eu
    local_skills={{ mickey_codex_local_skills_path | quote }}
    shared_skills={{ mickey_codex_shared_skills_path | quote }}

    if [ ! -d "$local_skills" ] || [ -L "$local_skills" ]; then
      exit 0
    fi

    if [ -n "$(find "$shared_skills" -mindepth 1 -maxdepth 1 -print -quit 2>/dev/null)" ]; then
      exit 0
    fi

    cd "$local_skills"
    for entry in .[!.]* ..?* *; do
      [ -e "$entry" ] || continue
      cp -R --no-preserve=mode,ownership,timestamps "$entry" "$shared_skills"/
    done
    chown -R {{ mickey_guest_admin_user | quote }}:{{ mickey_guest_admin_user | quote }} "$shared_skills"
    echo changed
  register: mickey_codex_seed_skills_result
  changed_when: "'changed' in mickey_codex_seed_skills_result.stdout"
  when:
    - mickey_codex_enable | default(false) | bool
    - mickey_codex_shared_auth_enable | default(false) | bool

- name: Compose local Codex skills from global and host-private skill directories
  ansible.builtin.raw: |
    set -eu
    shared_skills={{ mickey_codex_shared_skills_path | quote }}
    private_skills={{ mickey_codex_private_skills_path | quote }}
    local_skills={{ mickey_codex_local_skills_path | quote }}
    backup_skills={{ mickey_codex_local_skills_backup_path | quote }}
    changed=0

    if [ -L "$private_skills" ]; then
      rm -f "$private_skills"
      changed=1
    fi

    install -d -m 0770 -o {{ mickey_guest_admin_user | quote }} -g {{ mickey_guest_admin_user | quote }} "$shared_skills" "$private_skills"

    if [ -L "$local_skills" ]; then
      link_target="$(readlink "$local_skills" 2>/dev/null || true)"
      case "$link_target" in
        "$shared_skills"|"$private_skills")
          rm -f "$local_skills"
          changed=1
          ;;
        *)
          rm -rf "$backup_skills"
          mv "$local_skills" "$backup_skills"
          changed=1
          ;;
      esac
    fi

    if [ -e "$local_skills" ] && [ ! -d "$local_skills" ]; then
      rm -rf "$backup_skills"
      mv "$local_skills" "$backup_skills"
      install -d -m 0700 -o {{ mickey_guest_admin_user | quote }} -g {{ mickey_guest_admin_user | quote }} "$local_skills"
      changed=1
    elif [ ! -e "$local_skills" ]; then
      install -d -m 0700 -o {{ mickey_guest_admin_user | quote }} -g {{ mickey_guest_admin_user | quote }} "$local_skills"
      changed=1
    fi

    reconcile_stale_links() {
      find "$local_skills" -mindepth 1 -maxdepth 1 -type l -print | while IFS= read -r link; do
        target="$(readlink "$link" 2>/dev/null || true)"
        case "$target" in
          "$shared_skills"/*|"$private_skills"/*)
            if [ ! -e "$target" ]; then
              rm -f "$link"
              echo changed
            fi
            ;;
        esac
      done
    }

    link_skills_from() {
      source_dir="$1"
      for entry in "$source_dir"/* "$source_dir"/.[!.]* "$source_dir"/..?*; do
        [ -e "$entry" ] || [ -L "$entry" ] || continue
        name="$(basename "$entry")"
        target="$local_skills/$name"

        if [ -L "$target" ]; then
          current="$(readlink "$target" 2>/dev/null || true)"
          if [ "$current" = "$entry" ]; then
            continue
          fi
          case "$current" in
            "$shared_skills"/*|"$private_skills"/*)
              rm -f "$target"
              ;;
            *)
              continue
              ;;
          esac
        elif [ -e "$target" ]; then
          if [ "$source_dir" = "$shared_skills" ] && [ "$name" = ".system" ]; then
            install -d -m 0700 -o {{ mickey_guest_admin_user | quote }} -g {{ mickey_guest_admin_user | quote }} "$backup_skills"
            rm -rf "$backup_skills/$name"
            mv "$target" "$backup_skills/$name"
          else
            continue
          fi
        fi

        ln -s "$entry" "$target"
        chown -h {{ mickey_guest_admin_user | quote }}:{{ mickey_guest_admin_user | quote }} "$target"
        echo changed
      done
    }

    if reconcile_stale_links | grep -q changed; then
      changed=1
    fi

    if link_skills_from "$shared_skills" | grep -q changed; then
      changed=1
    fi

    # Host-private skills are linked second. If a host-private skill has the
    # same name as a global skill, the private symlink replaces the global one.
    if link_skills_from "$private_skills" | grep -q changed; then
      changed=1
    fi

    if [ "$changed" -eq 1 ]; then
      echo changed
    fi
  register: mickey_codex_skills_compose_result
  changed_when: "'changed' in mickey_codex_skills_compose_result.stdout"
  when:
    - mickey_codex_enable | default(false) | bool
    - mickey_codex_shared_auth_enable | default(false) | bool

- name: Apply global Codex MCP server entries
  ansible.builtin.raw: |
    set -eu
    config={{ (mickey_codex_local_home ~ '/config.toml') | quote }}
    servers_json={{ mickey_codex_global_mcp_servers | default([]) | to_json | quote }}

    install -d -m 0700 -o {{ mickey_guest_admin_user | quote }} -g {{ mickey_guest_admin_user | quote }} "$(dirname "$config")"
    touch "$config"
    chown {{ mickey_guest_admin_user | quote }}:{{ mickey_guest_admin_user | quote }} "$config"
    chmod 0600 "$config"

    python3 - "$config" "$servers_json" <<'PY'
    import json
    import os
    import re
    import sys

    path = sys.argv[1]
    servers = json.loads(sys.argv[2])

    with open(path, "r", encoding="utf-8") as fh:
        text = fh.read()

    original = text

    for server in servers:
        name = server["name"]
        url = server["url"]
        header = f"[mcp_servers.{name}]"
        block = f"{header}\nurl = {json.dumps(url)}\n"
        pattern = re.compile(
            rf"(?ms)^\[mcp_servers\.{re.escape(name)}\]\n.*?(?=^\[|\Z)"
        )

        if pattern.search(text):
            text = pattern.sub(block, text, count=1)
        else:
            if text and not text.endswith("\n"):
                text += "\n"
            if text and not text.endswith("\n\n"):
                text += "\n"
            text += block

    if text != original:
        tmp = f"{path}.tmp"
        with open(tmp, "w", encoding="utf-8") as fh:
            fh.write(text)
        os.replace(tmp, path)
        print("changed")
    PY
    chown {{ mickey_guest_admin_user | quote }}:{{ mickey_guest_admin_user | quote }} "$config"
    chmod 0600 "$config"
  register: mickey_codex_global_mcp_result
  changed_when: "'changed' in mickey_codex_global_mcp_result.stdout"
  when:
    - mickey_codex_enable | default(false) | bool
    - (mickey_codex_global_mcp_servers | default([]) | length) > 0

- name: Restore a local Codex auth file from backup when shared auth is disabled
  ansible.builtin.raw: |
    set -eu
    changed=0
    local_auth={{ mickey_codex_local_auth_path | quote }}
    backup_auth={{ mickey_codex_local_auth_backup_path | quote }}
    shell_auth={{ (mickey_codex_shell_home ~ '/auth.json') | quote }}
    shell_backup_auth={{ (mickey_codex_shell_backup_home ~ '/auth.json') | quote }}
    resolved_auth="$(readlink -f "$local_auth" 2>/dev/null || true)"
    resolved_shell_backup_auth="$(readlink -f "$shell_backup_auth" 2>/dev/null || true)"

    if [ -L "$local_auth" ] || [ ! -e "$local_auth" ]; then
      rm -f "$local_auth"
      changed=1
      if [ -f "$backup_auth" ]; then
        cp -f "$backup_auth" "$local_auth"
      elif [ -n "$resolved_auth" ] && [ -f "$resolved_auth" ]; then
        cp -f "$resolved_auth" "$local_auth"
      elif [ -f "$shell_backup_auth" ] && [ ! -L "$shell_backup_auth" ]; then
        cp -f "$shell_backup_auth" "$local_auth"
      elif [ -n "$resolved_shell_backup_auth" ] && [ -f "$resolved_shell_backup_auth" ]; then
        cp -f "$resolved_shell_backup_auth" "$local_auth"
      elif [ -f "$shell_auth" ] && [ ! -L "$shell_auth" ]; then
        cp -f "$shell_auth" "$local_auth"
      fi
    fi

    if [ -f "$local_auth" ]; then
      chown {{ mickey_guest_admin_user | quote }}:{{ mickey_guest_admin_user | quote }} "$local_auth"
      chmod 0600 "$local_auth"
    fi
    if [ "$changed" -eq 1 ]; then
      echo changed
    fi
  register: mickey_codex_restore_auth_result
  changed_when: "'changed' in mickey_codex_restore_auth_result.stdout"
  when:
    - mickey_codex_enable | default(false) | bool
    - not (mickey_codex_shared_auth_enable | default(false) | bool)
