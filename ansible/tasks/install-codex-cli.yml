---
- name: Confirm the playbook selected a Codex Node version
  ansible.builtin.assert:
    that:
      - mickey_codex_node_version is defined
      - (mickey_codex_node_version | string | length) > 0
    fail_msg: "Playbooks that include install-codex-cli.yml must define mickey_codex_node_version explicitly."
  when: mickey_codex_enable | default(false) | bool

- name: Ensure Codex tooling directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ mickey_guest_admin_user }}"
    group: "{{ mickey_guest_admin_user }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ mickey_guest_admin_home }}/.local"
      mode: "0755"
    - path: "{{ mickey_codex_local_bin_dir }}"
      mode: "0755"
    - path: "{{ mickey_codex_node_install_root }}"
      mode: "0755"
    - path: "{{ mickey_guest_admin_home }}/.local/lib"
      mode: "0755"
    - path: "{{ mickey_codex_local_state_root }}"
      mode: "0700"
    - path: "{{ mickey_codex_local_tmp_path }}"
      mode: "0700"
    - path: "{{ mickey_codex_local_home }}"
      mode: "0700"
  when: mickey_codex_enable | default(false) | bool

- name: Enable user namespaces for the Codex Linux sandbox
  ansible.builtin.raw: |
    set -eu
    tmp="$(mktemp)"
    cat > "$tmp" <<'EOF'
    # Managed by Mickey Ansible. Required for the Codex bubblewrap sandbox.
    kernel.unprivileged_userns_clone = 1
    user.max_user_namespaces = 95900
    kernel.apparmor_restrict_unprivileged_userns = 0
    EOF

    changed=0
    if [ ! -f {{ mickey_codex_sandbox_sysctl_path | quote }} ] || ! cmp -s "$tmp" {{ mickey_codex_sandbox_sysctl_path | quote }}; then
      install -D -m 0644 -o root -g root "$tmp" {{ mickey_codex_sandbox_sysctl_path | quote }}
      changed=1
    fi
    rm -f "$tmp"

    sysctl -q -w kernel.unprivileged_userns_clone=1
    sysctl -q -w user.max_user_namespaces=95900
    if sysctl kernel.apparmor_restrict_unprivileged_userns >/dev/null 2>&1; then
      sysctl -q -w kernel.apparmor_restrict_unprivileged_userns=0
    fi

    if [ "$changed" -eq 1 ]; then
      echo changed
    fi
  register: mickey_codex_sandbox_sysctl_result
  changed_when: "'changed' in mickey_codex_sandbox_sysctl_result.stdout"
  when:
    - mickey_codex_enable | default(false) | bool
    - mickey_codex_sandbox_userns_enable | default(true) | bool

- name: Persist the local Codex tmp bind mount in fstab
  ansible.builtin.raw: |
    set -eu
    line="{{ mickey_codex_local_tmp_path }} {{ mickey_codex_tmp_mount_path }} none bind 0 0"
    tmp="$(mktemp)"
    trap 'rm -f "$tmp"' EXIT

    if grep -Fqx "$line" /etc/fstab; then
      exit 0
    fi

    grep -v " {{ mickey_codex_tmp_mount_path }} none bind " /etc/fstab > "$tmp" || true
    printf '%s\n' "$line" >> "$tmp"
    cat "$tmp" > /etc/fstab
    systemctl daemon-reload
    echo changed
  register: mickey_codex_tmp_fstab_result
  changed_when: "'changed' in mickey_codex_tmp_fstab_result.stdout"
  when: mickey_codex_enable | default(false) | bool

- name: Remove the legacy Codex tmp bind mount from fstab
  ansible.builtin.raw: |
    set -eu
    legacy={{ mickey_codex_legacy_tmp_mount_path | quote }}
    current={{ mickey_codex_tmp_mount_path | quote }}
    tmp="$(mktemp)"
    trap 'rm -f "$tmp"' EXIT

    if [ "$legacy" = "$current" ]; then
      exit 0
    fi

    if mountpoint -q "$legacy"; then
      umount "$legacy" || umount -l "$legacy" || true
      changed=1
    else
      changed=0
    fi

    grep -v " $legacy none bind " /etc/fstab > "$tmp" || true
    if ! cmp -s "$tmp" /etc/fstab; then
      cat "$tmp" > /etc/fstab
      systemctl daemon-reload
      changed=1
    fi

    if [ "$changed" -eq 1 ]; then
      echo changed
    fi
  register: mickey_codex_legacy_tmp_fstab_result
  changed_when: "'changed' in mickey_codex_legacy_tmp_fstab_result.stdout"
  when:
    - mickey_codex_enable | default(false) | bool
    - mickey_codex_legacy_tmp_mount_path is defined

- name: Remove the shared Codex tmp bind mount from fstab
  ansible.builtin.raw: |
    set -eu
    stale={{ mickey_codex_shared_tmp_mount_path | quote }}
    current={{ mickey_codex_tmp_mount_path | quote }}
    tmp="$(mktemp)"
    trap 'rm -f "$tmp"' EXIT

    if [ "$stale" = "$current" ]; then
      exit 0
    fi

    if mountpoint -q "$stale"; then
      umount "$stale" || umount -l "$stale" || true
      changed=1
    else
      changed=0
    fi

    grep -v " $stale none bind " /etc/fstab > "$tmp" || true
    if ! cmp -s "$tmp" /etc/fstab; then
      cat "$tmp" > /etc/fstab
      systemctl daemon-reload
      changed=1
    fi

    if [ "$changed" -eq 1 ]; then
      echo changed
    fi
  register: mickey_codex_shared_tmp_fstab_result
  changed_when: "'changed' in mickey_codex_shared_tmp_fstab_result.stdout"
  when:
    - mickey_codex_enable | default(false) | bool
    - mickey_codex_shared_tmp_mount_path is defined

- name: Mount the local Codex tmp bind mount
  ansible.builtin.raw: |
    set -eu
    target={{ mickey_codex_tmp_mount_path | quote }}
    source={{ mickey_codex_local_tmp_path | quote }}

    install -d -m 0700 -o {{ mickey_guest_admin_user | quote }} -g {{ mickey_guest_admin_user | quote }} "$source"
    install -d -m 0700 -o {{ mickey_guest_admin_user | quote }} -g {{ mickey_guest_admin_user | quote }} "$target"

    if mountpoint -q "$target"; then
      current_source="$(findmnt -no SOURCE --target "$target" || true)"
      case "$current_source" in
        "$source"|*"[$source]") exit 0 ;;
      esac
      umount "$target"
    fi

    mount "$target"
    echo changed
  register: mickey_codex_tmp_mount_result
  changed_when: "'changed' in mickey_codex_tmp_mount_result.stdout"
  when: mickey_codex_enable | default(false) | bool

- name: Install the pinned Node.js runtime for Codex
  ansible.builtin.raw: |
    set -eu
    changed=0
    archive="/tmp/{{ mickey_codex_node_archive_name }}.tar.xz"
    if [ "$({{ mickey_codex_node_install_dir }}/bin/node -v 2>/dev/null || true)" != "v{{ mickey_codex_node_version }}" ]; then
      rm -rf {{ mickey_codex_node_install_dir | quote }}
      curl -fsSL {{ mickey_codex_node_archive_url | quote }} -o "$archive"
      tar -xJf "$archive" -C {{ mickey_codex_node_install_root | quote }}
      chown -R {{ mickey_guest_admin_user | quote }}:{{ mickey_guest_admin_user | quote }} {{ mickey_codex_node_install_dir | quote }}
      rm -f "$archive"
      changed=1
    fi
    for pair in \
      "{{ mickey_codex_node_install_dir }}/bin/node|{{ mickey_codex_local_bin_dir }}/node" \
      "{{ mickey_codex_node_install_dir }}/bin/npm|{{ mickey_codex_local_bin_dir }}/npm" \
      "{{ mickey_codex_node_install_dir }}/bin/npx|{{ mickey_codex_local_bin_dir }}/npx" \
      "{{ mickey_codex_local_bin_dir }}/node|/usr/local/bin/node" \
      "{{ mickey_codex_local_bin_dir }}/npm|/usr/local/bin/npm" \
      "{{ mickey_codex_local_bin_dir }}/npx|/usr/local/bin/npx"
    do
      src="${pair%%|*}"
      dst="${pair##*|}"
      if [ "$(readlink "$dst" 2>/dev/null || true)" != "$src" ]; then
        ln -sfn "$src" "$dst"
        changed=1
      fi
    done
    if [ "$changed" -eq 1 ]; then
      echo changed
    fi
  register: mickey_codex_node_result
  changed_when: "'changed' in mickey_codex_node_result.stdout"
  when: mickey_codex_enable | default(false) | bool

- name: Install Codex CLI for the guest user
  ansible.builtin.raw: |
    set -eu
    changed=0

    package={{ mickey_codex_package | quote }}
    requested_version={{ mickey_codex_version | default('') | quote }}
    if [ -n "$requested_version" ]; then
      package="$package@$requested_version"
    fi

    current_version="$({{ mickey_codex_npm_bin_path }} --version 2>/dev/null | awk 'NR==1 {print $2}' || true)"
    if [ -n "$requested_version" ] && [ "$current_version" != "$requested_version" ]; then
      su - {{ mickey_guest_admin_user }} -c "PATH=/usr/local/bin:/usr/bin:/bin npm install --no-audit --no-fund -g $package"
      changed=1
    elif [ -z "$current_version" ]; then
      su - {{ mickey_guest_admin_user }} -c "PATH=/usr/local/bin:/usr/bin:/bin npm install --no-audit --no-fund -g $package"
      changed=1
    fi

    if [ "$(readlink {{ mickey_codex_real_bin_path | quote }} 2>/dev/null || true)" != "{{ mickey_codex_npm_bin_path }}" ]; then
      ln -sfn {{ mickey_codex_npm_bin_path }} {{ mickey_codex_real_bin_path }}
      changed=1
    fi
    if [ "$changed" -eq 1 ]; then
      echo changed
    fi
  register: mickey_codex_cli_result
  changed_when: "'changed' in mickey_codex_cli_result.stdout"
  when: mickey_codex_enable | default(false) | bool

- name: Install the Codex update helper
  ansible.builtin.raw: |
    set -eu
    tmp="$(mktemp)"
    cat > "$tmp" <<'EOF'
    #!/bin/sh
    set -eu

    npm install --no-audit --no-fund -g {{ mickey_codex_package | quote }}@latest
    codex --version
    EOF

    if [ -f {{ mickey_codex_update_path | quote }} ] && cmp -s "$tmp" {{ mickey_codex_update_path | quote }}; then
      rm -f "$tmp"
      exit 0
    fi

    install -D -m 0755 -o root -g root "$tmp" {{ mickey_codex_update_path | quote }}
    rm -f "$tmp"
    echo changed
  register: mickey_codex_update_helper_result
  changed_when: "'changed' in mickey_codex_update_helper_result.stdout"
  when: mickey_codex_enable | default(false) | bool

- name: Install the Codex auth sync helper
  ansible.builtin.raw: |
    set -eu
    tmp="$(mktemp)"
    cat > "$tmp" <<'EOF'
    {{ lookup('ansible.builtin.template', (mickey_ansible_root | default(playbook_dir ~ '/..')) ~ '/templates/mickey-codex-sync-auth.sh.j2') }}
    EOF

    if [ -f {{ mickey_codex_sync_script_path | quote }} ] && cmp -s "$tmp" {{ mickey_codex_sync_script_path | quote }}; then
      rm -f "$tmp"
      exit 0
    fi

    install -D -m 0755 -o root -g root "$tmp" {{ mickey_codex_sync_script_path | quote }}
    rm -f "$tmp"
    echo changed
  register: mickey_codex_sync_helper_result
  changed_when: "'changed' in mickey_codex_sync_helper_result.stdout"
  when:
    - mickey_codex_enable | default(false) | bool
    - mickey_codex_shared_auth_enable | default(false) | bool

- name: Remove the Codex auth sync helper when shared auth is disabled
  ansible.builtin.raw: |
    if [ -e {{ mickey_codex_sync_script_path | quote }} ]; then
      rm -f {{ mickey_codex_sync_script_path | quote }}
      echo changed
    fi
  register: mickey_codex_sync_helper_absent_result
  changed_when: "'changed' in mickey_codex_sync_helper_absent_result.stdout"
  when:
    - mickey_codex_enable | default(false) | bool
    - not (mickey_codex_shared_auth_enable | default(false) | bool)

- name: Install the Codex launcher wrapper
  ansible.builtin.raw: |
    set -eu
    tmp="$(mktemp)"
    cat > "$tmp" <<'EOF'
    {{ lookup('ansible.builtin.template', (mickey_ansible_root | default(playbook_dir ~ '/..')) ~ '/templates/codex-wrapper.sh.j2') }}
    EOF

    if [ -f {{ mickey_codex_wrapper_path | quote }} ] && cmp -s "$tmp" {{ mickey_codex_wrapper_path | quote }}; then
      rm -f "$tmp"
      exit 0
    fi

    install -D -m 0755 -o {{ mickey_guest_admin_user | quote }} -g {{ mickey_guest_admin_user | quote }} "$tmp" {{ mickey_codex_wrapper_path | quote }}
    rm -f "$tmp"
    echo changed
  register: mickey_codex_wrapper_result
  changed_when: "'changed' in mickey_codex_wrapper_result.stdout"
  when: mickey_codex_enable | default(false) | bool

- name: Export CODEX_HOME for login shells
  ansible.builtin.raw: |
    set -eu
    tmp="$(mktemp)"
    cat > "$tmp" <<'EOF'
    case "${CODEX_HOME:-}" in
      ""|{{ mickey_codex_hosts_root }}/*|{{ mickey_codex_legacy_shared_root }}/hosts/*)
        export CODEX_HOME={{ mickey_codex_local_home | quote }}
        ;;
    esac
    EOF

    if [ -f {{ mickey_codex_profile_script_path | quote }} ] && cmp -s "$tmp" {{ mickey_codex_profile_script_path | quote }}; then
      rm -f "$tmp"
      exit 0
    fi

    install -D -m 0644 -o root -g root "$tmp" {{ mickey_codex_profile_script_path | quote }}
    rm -f "$tmp"
    echo changed
  register: mickey_codex_profile_script_result
  changed_when: "'changed' in mickey_codex_profile_script_result.stdout"
  when: mickey_codex_enable | default(false) | bool

- name: Publish the Codex wrapper on the global PATH
  ansible.builtin.raw: |
    if [ "$(readlink /usr/local/bin/codex 2>/dev/null || true)" != "{{ mickey_codex_wrapper_path }}" ]; then
      ln -sfn {{ mickey_codex_wrapper_path }} /usr/local/bin/codex
      echo changed
    fi
  register: mickey_codex_path_result
  changed_when: "'changed' in mickey_codex_path_result.stdout"
  when: mickey_codex_enable | default(false) | bool
