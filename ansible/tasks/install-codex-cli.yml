---
- name: Ensure Codex tooling directories exist
  ansible.builtin.raw: |
    install -d -m 0755 -o {{ mickey_guest_admin_user | quote }} -g {{ mickey_guest_admin_user | quote }} {{ (mickey_guest_admin_home ~ '/.local') | quote }}
    install -d -m 0755 -o {{ mickey_guest_admin_user | quote }} -g {{ mickey_guest_admin_user | quote }} {{ mickey_codex_local_bin_dir | quote }}
    install -d -m 0755 -o {{ mickey_guest_admin_user | quote }} -g {{ mickey_guest_admin_user | quote }} {{ mickey_codex_node_install_root | quote }}
    install -d -m 0755 -o {{ mickey_guest_admin_user | quote }} -g {{ mickey_guest_admin_user | quote }} {{ (mickey_guest_admin_home ~ '/.local/lib') | quote }}
    install -d -m 0700 -o {{ mickey_guest_admin_user | quote }} -g {{ mickey_guest_admin_user | quote }} {{ mickey_codex_local_home | quote }}

- name: Install the pinned Node.js runtime for Codex
  ansible.builtin.raw: |
    set -eu
    archive="/tmp/{{ mickey_codex_node_archive_name }}.tar.xz"
    if [ "$({{ mickey_codex_node_install_dir }}/bin/node -v 2>/dev/null || true)" != "v{{ mickey_codex_node_version }}" ]; then
      rm -rf {{ mickey_codex_node_install_dir | quote }}
      curl -fsSL {{ mickey_codex_node_archive_url | quote }} -o "$archive"
      tar -xJf "$archive" -C {{ mickey_codex_node_install_root | quote }}
      chown -R {{ mickey_guest_admin_user | quote }}:{{ mickey_guest_admin_user | quote }} {{ mickey_codex_node_install_dir | quote }}
      rm -f "$archive"
    fi
    ln -sfn {{ mickey_codex_node_install_dir }}/bin/node {{ mickey_codex_local_bin_dir }}/node
    ln -sfn {{ mickey_codex_node_install_dir }}/bin/npm {{ mickey_codex_local_bin_dir }}/npm
    ln -sfn {{ mickey_codex_node_install_dir }}/bin/npx {{ mickey_codex_local_bin_dir }}/npx
    ln -sfn {{ mickey_codex_local_bin_dir }}/node /usr/local/bin/node
    ln -sfn {{ mickey_codex_local_bin_dir }}/npm /usr/local/bin/npm
    ln -sfn {{ mickey_codex_local_bin_dir }}/npx /usr/local/bin/npx
  when: mickey_codex_enable | default(false) | bool

- name: Install Codex CLI for the guest user
  ansible.builtin.raw: |
    set -eu
    current_version="$({{ mickey_codex_npm_bin_path }} --version 2>/dev/null | awk '{print $2}' || true)"
    if [ "$current_version" != "{{ mickey_codex_version }}" ]; then
      su - {{ mickey_guest_admin_user }} -c 'PATH=/usr/local/bin:/usr/bin:/bin npm install --no-audit --no-fund --prefix {{ mickey_guest_admin_home }}/.local {{ mickey_codex_package }}@{{ mickey_codex_version }}'
    fi
    ln -sfn {{ mickey_codex_npm_bin_path }} {{ mickey_codex_real_bin_path }}
  when: mickey_codex_enable | default(false) | bool

- name: Install the Codex auth sync helper
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/mickey-codex-sync-auth.sh.j2"
    dest: "{{ mickey_codex_sync_script_path }}"
    owner: root
    group: root
    mode: "0755"
  when:
    - mickey_codex_enable | default(false) | bool
    - mickey_codex_shared_auth_enable | default(false) | bool

- name: Remove the Codex auth sync helper when shared auth is disabled
  ansible.builtin.file:
    path: "{{ mickey_codex_sync_script_path }}"
    state: absent
  when:
    - mickey_codex_enable | default(false) | bool
    - not (mickey_codex_shared_auth_enable | default(false) | bool)

- name: Install the Codex launcher wrapper
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../templates/codex-wrapper.sh.j2"
    dest: "{{ mickey_codex_wrapper_path }}"
    owner: "{{ mickey_guest_admin_user }}"
    group: "{{ mickey_guest_admin_user }}"
    mode: "0755"
  when: mickey_codex_enable | default(false) | bool

- name: Export CODEX_HOME for login shells
  ansible.builtin.copy:
    dest: "{{ mickey_codex_profile_script_path }}"
    owner: root
    group: root
    mode: "0644"
    content: |
      export CODEX_HOME="${CODEX_HOME:-{{ mickey_codex_local_home }}}"
  when: mickey_codex_enable | default(false) | bool

- name: Publish the Codex wrapper on the global PATH
  ansible.builtin.raw: |
    ln -sfn {{ mickey_codex_wrapper_path }} /usr/local/bin/codex
  when: mickey_codex_enable | default(false) | bool
