---
- name: Ensure the utility Projects root exists
  ansible.builtin.file:
    path: "{{ mickey_utility_projects_root }}"
    state: directory
    owner: "{{ mickey_guest_admin_user }}"
    group: "{{ mickey_guest_admin_user }}"
    mode: "0755"

- name: Sync the Mickey projects tree from the Ansible controller
  ansible.builtin.command:
    argv:
      - rsync
      - -a
      - --delete
      - --itemize-changes
      - -e
      - >-
        ssh -i {{ ansible_ssh_private_key_file | default(lookup('ansible.builtin.env', 'HOME') ~ '/.ssh/mickey') }}
        {{ ansible_ssh_common_args | default('-o IdentitiesOnly=yes') }}
        -o StrictHostKeyChecking=no
        -o UserKnownHostsFile=/dev/null
        -o UpdateHostKeys=no
      - "{{ mickey_utility_projects_source_dir | default(playbook_dir ~ '/../../..') }}/"
      - "{{ mickey_guest_admin_user }}@{{ ansible_host }}:{{ mickey_utility_projects_dest_dir }}/"
  delegate_to: localhost
  become: false
  register: mickey_utility_projects_sync_result
  changed_when: >-
    (
      mickey_utility_projects_sync_result.stdout_lines
      | default([])
      | reject('equalto', '')
      | list
      | length
    ) > 0
